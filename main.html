<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fce4ec; /* Rosa pastel suave */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5d4037;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 90%;
        }

        /* Estilo para la imagen/GIF */
        .gif-container img {
            width: 100%;
            max-width: 300px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        /* Estilo para el texto */
        h1 {
            font-size: 1.8rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .highlight {
            color: #ec407a;
            display: block;
            margin-top: 10px;
            font-size: 1.2rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">
            <!-- Cambia "gato-trabajando.gif" por el nombre de tu archivo -->
            <img src="gato.jpg" alt="Gato trabajando duro">
        </div>
        
        <h1>
            Feliz día del trabajador.
        </h1>
        <p class="highlight">tuki</p>
    </div>

</body>
</html>
